<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Export Health Data</title>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <!-- 🔧 Your Firebase config & global variables -->
  <script src="firebase-init.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      padding: 2em;
      margin: 0;
    }
    h1 {
      color: #2c7a7b;
      text-align: center;
      margin-bottom: 0.5em;
    }
    .back-button {
      text-align: center;
      margin-bottom: 2em;
    }
    .back-button a button {
      background-color: #2c7a7b;
      color: white;
      padding: 0.5em 1.2em;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      cursor: pointer;
    }
    button.download {
      display: block;
      padding: 1em;
      background: #2c7a7b;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      cursor: pointer;
      width: 100%;
      max-width: 300px;
      margin: 1em auto;
    }
    pre {
      background: white;
      padding: 1em;
      border-radius: 10px;
      max-height: 400px;
      overflow: auto;
      margin-top: 2em;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
  </style>
</head>
<body>
  <h1>📤 Export My Health Data</h1>

  <!-- Back to Home Button -->
  <div class="back-button">
    <a href="index.html">
      <button>← Back to Home</button>
    </a>
  </div>

  <!-- Export Button -->
  <button class="download" onclick="exportData()">Download JSON Export</button>

  <!-- Output Display -->
  <pre id="output">Your data will appear here...</pre>

  <script>
    const auth = firebase.auth();

    auth.onAuthStateChanged(user => {
      if (!user) {
        auth.signInAnonymously().catch(err => {
          alert("Authentication failed.");
          console.error(err);
        });
      } else {
        currentUser = user; // Assume already defined in firebase-init.js
      }
    });

    async function exportData() {
      if (!currentUser) return alert("User not authenticated.");

      const collections = ['medications', 'moods', 'goals', 'visits'];
      const exportObject = {};

      try {
        for (let col of collections) {
          const snapshot = await db.collection(col)
            .where("uid", "==", currentUser.uid)
            .orderBy("timestamp", "desc")
            .get();

          exportObject[col] = snapshot.docs.map(doc => doc.data());
        }

        const jsonStr = JSON.stringify(exportObject, null, 2);
        document.getElementById("output").textContent = jsonStr;

        const blob = new Blob([jsonStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "bradley-health-export.json";
        a.click();
      } catch (err) {
        console.error("Export failed:", err);
        alert("Failed to export data.");
      }
    }
  </script>
</body>
</html>
