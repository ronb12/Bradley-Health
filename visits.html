<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Doctor Visit Log</title>

  <!-- Firebase + jsPDF -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
 

  <style>
    body { font-family: Arial; background: #f0f4f8; padding: 2em; }
    h1 { color: #2c7a7b; }
    input, textarea, select, button {
      display: block; width: 100%; margin: 1em 0; padding: 0.75em;
      border-radius: 8px; border: 1px solid #ccc;
    }
    button { background-color: #2c7a7b; color: white; border: none; cursor: pointer; }
    .visit-entry {
      background: white; padding: 1em; border-radius: 10px;
      margin-bottom: 1em; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .tag {
      display: inline-block; background: #2c7a7b; color: white;
      padding: 0.2em 0.6em; margin-top: 0.5em; border-radius: 6px;
      font-size: 0.8em;
    }
    .visit-entry button {
      margin-top: 0.5em; margin-right: 0.5em;
      background: #555;
    }
    .home-button {
      background-color: #3d4852;
      color: white;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>📅 Doctor Visit Log</h1>

  <input type="date" id="visitDate" />
  <input type="text" id="provider" placeholder="Doctor or Clinic Name" />
  <input type="text" id="reason" placeholder="Reason for visit" />
  <textarea id="notes" placeholder="Additional notes (optional)"></textarea>
  <select id="tag">
    <option value="">Select Tag</option>
    <option value="Checkup">Checkup</option>
    <option value="Urgent">Urgent</option>
    <option value="Follow-up">Follow-up</option>
    <option value="Primary Care">Primary Care</option>
  </select>
  <input type="file" id="docFile" />
  <button onclick="addVisit()">Add Visit</button>
  <button onclick="exportVisitsToPDF()">Export Visits as PDF</button>
  <button class="home-button" onclick="window.location.href='index.html'">← Back to Home</button>

  <div id="visitList">Loading visits...</div>

  <script>
    const db = firebase.firestore();
    const storage = firebase.storage();

    firebase.auth().onAuthStateChanged(user => {
      if (!user) window.location.href = "login.html";
      else {
        currentUser = user;
        loadVisits();
      }
    });

    async function addVisit() {
      const date = document.getElementById("visitDate").value;
      const provider = document.getElementById("provider").value.trim();
      const reason = document.getElementById("reason").value.trim();
      const notes = document.getElementById("notes").value.trim();
      const tag = document.getElementById("tag").value;
      const file = document.getElementById("docFile").files[0];

      if (!date || !provider || !reason) return alert("Fill all required fields.");

      let fileUrl = "";
      if (file) {
        const ref = storage.ref(`visit-docs/${currentUser.uid}/${Date.now()}-${file.name}`);
        await ref.put(file);
        fileUrl = await ref.getDownloadURL();
      }

      await db.collection("visits").add({
        uid: currentUser.uid,
        date, provider, reason, notes, tag, fileUrl,
        timestamp: new Date()
      });

      clearForm();
      loadVisits();
    }

    function clearForm() {
      document.getElementById("visitDate").value = "";
      document.getElementById("provider").value = "";
      document.getElementById("reason").value = "";
      document.getElementById("notes").value = "";
      document.getElementById("tag").value = "";
      document.getElementById("docFile").value = "";
    }

    function loadVisits() {
      db.collection("visits").where("uid", "==", currentUser.uid)
        .orderBy("date", "desc")
        .onSnapshot(snapshot => {
          const list = document.getElementById("visitList");
          list.innerHTML = "";

          if (snapshot.empty) {
            list.innerHTML = "<p>No visits logged yet.</p>";
            return;
          }

          snapshot.forEach(doc => {
            const v = doc.data();
            const id = doc.id;
            const div = document.createElement("div");
            div.className = "visit-entry";
            div.innerHTML = `
              <strong>${v.date}</strong><br/>
              <strong>Provider:</strong> ${v.provider}<br/>
              <strong>Reason:</strong> ${v.reason}<br/>
              ${v.notes ? `<em>${v.notes}</em><br/>` : ""}
              ${v.tag ? `<span class='tag'>${v.tag}</span><br/>` : ""}
              ${v.fileUrl ? `<a href='${v.fileUrl}' target='_blank'>📎 View Document</a><br/>` : ""}
              <button onclick="editVisit('${id}')">Edit</button>
              <button onclick="deleteVisit('${id}')">Delete</button>
            `;
            list.appendChild(div);
          });
        });
    }

    async function editVisit(id) {
      const doc = await db.collection("visits").doc(id).get();
      if (!doc.exists) return alert("Visit not found.");
      const v = doc.data();
      document.getElementById("visitDate").value = v.date;
      document.getElementById("provider").value = v.provider;
      document.getElementById("reason").value = v.reason;
      document.getElementById("notes").value = v.notes;
      document.getElementById("tag").value = v.tag;
      deleteVisit(id);
    }

    function deleteVisit(id) {
      if (confirm("Delete this visit?")) {
        db.collection("visits").doc(id).delete();
      }
    }

    async function exportVisitsToPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.setFontSize(12);

      const snap = await db.collection("visits")
        .where("uid", "==", currentUser.uid)
        .orderBy("date", "desc").get();

      if (snap.empty) return alert("No visits to export.");

      doc.text("Bradley Health - Visit History", 10, 10);
      let y = 20;
      snap.forEach(d => {
        const v = d.data();
        doc.text(`Date: ${v.date}`, 10, y);
        doc.text(`Provider: ${v.provider}`, 10, y + 6);
        doc.text(`Reason: ${v.reason}`, 10, y + 12);
        if (v.notes) doc.text(`Notes: ${v.notes}`, 10, y + 18);
        if (v.tag) doc.text(`Tag: ${v.tag}`, 10, y + 24);
        y += 30;
        if (y > 270) { doc.addPage(); y = 20; }
      });

      doc.save("Visit-History.pdf");
    }
  </script>
</body>
</html>
