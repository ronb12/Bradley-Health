<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Tracker - Bradley Health</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="assets/mobile.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2B6CB0">
</head>
<body>
    <div class="mobile-container">
        <!-- Mobile Header -->
        <header class="mobile-header">
            <h1>Mood Tracker</h1>
            <button class="menu-btn" aria-label="Menu">
                <span></span>
            </button>
        </header>

        <!-- Main Content -->
        <main class="mobile-content" role="main">
            <!-- Current Mood Card -->
            <div class="mobile-card">
                <h2>How are you feeling?</h2>
                <div class="mood-emoji-grid">
                    <button class="mood-emoji" data-mood="SAD">😢</button>
                    <button class="mood-emoji" data-mood="MEH">😕</button>
                    <button class="mood-emoji" data-mood="NEUTRAL">😐</button>
                    <button class="mood-emoji" data-mood="GOOD">🙂</button>
                    <button class="mood-emoji" data-mood="GREAT">😄</button>
                    <button class="mood-emoji" data-mood="EXCELLENT">🤩</button>
                </div>

                <div class="mood-factors">
                    <div class="mood-factor">
                        <span class="factor-label">Sleep Quality</span>
                        <div id="sleep-rating" class="factor-rating">
                            <button class="rating-dot" data-rating="POOR"></button>
                            <button class="rating-dot" data-rating="FAIR"></button>
                            <button class="rating-dot" data-rating="GOOD"></button>
                            <button class="rating-dot" data-rating="EXCELLENT"></button>
                        </div>
                    </div>
                    <div class="mood-factor">
                        <span class="factor-label">Stress Level</span>
                        <div id="stress-rating" class="factor-rating">
                            <button class="rating-dot" data-rating="POOR"></button>
                            <button class="rating-dot" data-rating="FAIR"></button>
                            <button class="rating-dot" data-rating="GOOD"></button>
                            <button class="rating-dot" data-rating="EXCELLENT"></button>
                        </div>
                    </div>
                    <div class="mood-factor">
                        <span class="factor-label">Physical Activity</span>
                        <div id="activity-rating" class="factor-rating">
                            <button class="rating-dot" data-rating="POOR"></button>
                            <button class="rating-dot" data-rating="FAIR"></button>
                            <button class="rating-dot" data-rating="GOOD"></button>
                            <button class="rating-dot" data-rating="EXCELLENT"></button>
                        </div>
                    </div>
                </div>

                <form id="mood-form" class="mobile-form">
                    <div class="form-group">
                        <label for="mood-notes">Notes</label>
                        <textarea id="mood-notes" rows="3" placeholder="How are you feeling today?"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Save Entry</button>
                </form>
            </div>

            <!-- Mood Statistics Card -->
            <div class="mobile-card">
                <div class="card-header">
                    <h2>Mood Statistics</h2>
                    <div class="time-range">
                        <button class="time-range-btn active" data-range="week">Week</button>
                        <button class="time-range-btn" data-range="month">Month</button>
                        <button class="time-range-btn" data-range="year">Year</button>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-label">Average Mood</span>
                        <span class="stat-value mood-stats-average">-</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Best Day</span>
                        <span class="stat-value mood-stats-best">-</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Trend</span>
                        <span class="stat-value mood-stats-trend">-</span>
                    </div>
                </div>

                <div class="mood-chart"></div>
            </div>

            <!-- Mood History Card -->
            <div class="mobile-card">
                <div class="card-header">
                    <h2>Mood History</h2>
                    <button class="export-btn" aria-label="Export Data">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                        </svg>
                    </button>
                </div>
                <div class="mood-list"></div>
            </div>
        </main>

        <!-- Mobile Navigation -->
        <nav class="mobile-nav">
            <a href="index.html" class="nav-item">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                <span>Home</span>
            </a>
            <a href="favorites.html" class="nav-item">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                </svg>
                <span>Favorites</span>
            </a>
            <a href="medications.html" class="nav-item">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
                </svg>
                <span>Medications</span>
            </a>
            <a href="mood.html" class="nav-item active">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span>Mood</span>
            </a>
        </nav>
    </div>

    <script src="assets/mobile.js" defer></script>
</body>
</html>
