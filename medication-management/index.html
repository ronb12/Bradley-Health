<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medication Management - Bradley Health</title>
    <link rel="stylesheet" href="../assets/style.css">
    <link rel="stylesheet" href="../assets/mobile.css">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#2B6CB0">
</head>
<body>
    <div class="mobile-container">
        <!-- Mobile Header -->
        <header class="mobile-header">
            <h1>Medication Management</h1>
            <button class="menu-btn" aria-label="Menu">
                <span></span>
            </button>
        </header>

        <!-- Main Content -->
        <main class="mobile-content">
            <!-- Today's Schedule -->
            <div class="mobile-card">
                <h2>Today's Schedule</h2>
                <div class="medication-schedule">
                    <div class="schedule-time-group">
                        <h3>Morning</h3>
                        <div class="medication-list">
                            <!-- Medications will be populated here -->
                        </div>
                    </div>
                    <div class="schedule-time-group">
                        <h3>Afternoon</h3>
                        <div class="medication-list">
                            <!-- Medications will be populated here -->
                        </div>
                    </div>
                    <div class="schedule-time-group">
                        <h3>Evening</h3>
                        <div class="medication-list">
                            <!-- Medications will be populated here -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Interaction Checker -->
            <div class="mobile-card">
                <h2>Interaction Checker</h2>
                <div class="interaction-checker">
                    <div class="medication-selector">
                        <select class="mobile-select" id="medication1">
                            <option value="">Select first medication</option>
                        </select>
                        <select class="mobile-select" id="medication2">
                            <option value="">Select second medication</option>
                        </select>
                    </div>
                    <button class="mobile-button mobile-button-primary" id="checkInteractions">
                        Check Interactions
                    </button>
                    <div class="interaction-results">
                        <!-- Results will be populated here -->
                    </div>
                </div>
            </div>

            <!-- Refill Reminders -->
            <div class="mobile-card">
                <h2>Refill Reminders</div>
                <div class="refill-reminders">
                    <div class="refill-list">
                        <!-- Refill reminders will be populated here -->
                    </div>
                    <button class="mobile-button mobile-button-secondary" id="addRefillReminder">
                        Add Refill Reminder
                    </button>
                </div>
            </div>

            <!-- Medication History -->
            <div class="mobile-card">
                <h2>Medication History</h2>
                <div class="medication-history">
                    <div class="history-filters">
                        <select class="mobile-select" id="historyTimeRange">
                            <option value="week">This Week</option>
                            <option value="month">This Month</option>
                            <option value="year">This Year</option>
                        </select>
                    </div>
                    <div class="history-list">
                        <!-- History will be populated here -->
                    </div>
                </div>
            </div>
        </main>

        <!-- Mobile Navigation -->
        <nav class="mobile-nav">
            <a href="../dashboard.html" class="nav-item">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                <span>Home</span>
            </a>
            <a href="index.html" class="nav-item active">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
                </svg>
                <span>Meds</span>
            </a>
            <a href="../insights/index.html" class="nav-item">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                </svg>
                <span>Insights</span>
            </a>
            <a href="../profile.html" class="nav-item">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
                <span>Profile</span>
            </a>
        </nav>
    </div>

    <script src="../assets/mobile.js"></script>
    <script src="medication-management.js"></script>
</body>
</html>
