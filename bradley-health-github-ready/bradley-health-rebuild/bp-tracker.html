<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bradley Health - BP Tracker</title>
  <link rel="stylesheet" href="assets/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header><h1>Bradley Health</h1><p>Blood Pressure Tracker</p></header>
  <main>
    <form id="bpForm">
      <input type="number" id="systolic" placeholder="Systolic" required />
      <input type="number" id="diastolic" placeholder="Diastolic" required />
      <input type="number" id="pulse" placeholder="Pulse (BPM)" />
      <textarea id="mood" placeholder="Symptoms or notes..."></textarea>
      <button type="submit">Log Reading</button>
    </form>
    <div id="feedbackBox"></div>
    <table id="historyTable"><thead><tr><th>Date</th><th>BP</th><th>Pulse</th><th>Status</th><th>Notes</th></tr></thead><tbody></tbody></table>
    <canvas id="bpChart" height="100"></canvas>
    <button onclick="window.print()">Export PDF</button>
  </main>
  <script src="js/bp.js"></script>
</body>
</html>
