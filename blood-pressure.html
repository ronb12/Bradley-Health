<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blood Pressure Tracker - Bradley Health</title>
  <link rel="icon" href="assets/icon-192.png" />
  <link rel="stylesheet" href="assets/style.css" />

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="firebase-init.js"></script>
  <script src="assets/shared.js"></script>
</head>
<body>
  <header>
    <h1>🩺 Blood Pressure Tracker</h1>
    <button id="darkToggle" class="toggle-dark" aria-label="Toggle dark mode">🌓</button>
  </header>

  <main>
    <section class="bp-input">
      <h2>Log Blood Pressure</h2>
      <form id="bpForm" onsubmit="logBloodPressure(event)">
        <div class="input-group">
          <label for="systolic">Systolic (Top Number)</label>
          <input type="number" id="systolic" required min="60" max="250" 
                 aria-label="Systolic blood pressure" />
        </div>
        <div class="input-group">
          <label for="diastolic">Diastolic (Bottom Number)</label>
          <input type="number" id="diastolic" required min="40" max="150" 
                 aria-label="Diastolic blood pressure" />
        </div>
        <div class="input-group">
          <label for="pulse">Pulse Rate (BPM)</label>
          <input type="number" id="pulse" required min="40" max="200" 
                 aria-label="Pulse rate" />
        </div>
        <div class="input-group">
          <label for="timeOfDay">Time of Day</label>
          <select id="timeOfDay" required>
            <option value="morning">Morning</option>
            <option value="afternoon">Afternoon</option>
            <option value="evening">Evening</option>
            <option value="night">Night</option>
          </select>
        </div>
        <div class="input-group">
          <label for="medicationStatus">Medication Status</label>
          <select id="medicationStatus">
            <option value="taken">Taken as prescribed</option>
            <option value="missed">Missed dose</option>
            <option value="partial">Partial dose</option>
            <option value="na">Not applicable</option>
          </select>
        </div>
        <div class="input-group">
          <label for="activityLevel">Activity Level</label>
          <select id="activityLevel">
            <option value="resting">Resting</option>
            <option value="light">Light Activity</option>
            <option value="moderate">Moderate Activity</option>
            <option value="intense">Intense Activity</option>
          </select>
        </div>
        <div class="input-group">
          <label for="bpNote">Notes (Optional)</label>
          <textarea id="bpNote" rows="3" 
                    placeholder="Add any notes about your reading (e.g., after exercise, medication taken, stress level)"
                    aria-label="Additional notes"></textarea>
        </div>
        <button type="submit" id="logBpBtn">Log Reading</button>
      </form>
    </section>

    <section class="bp-summary">
      <h2>Today's Summary</h2>
      <div id="todaySummary" class="summary-card">
        <p>Loading today's readings...</p>
      </div>
    </section>

    <section class="bp-chart">
      <h2>7-Day History</h2>
      <div class="chart-container">
        <canvas id="bpChart"></canvas>
      </div>
      <div class="chart-controls">
        <button onclick="updateChartView('week')" class="active">Week</button>
        <button onclick="updateChartView('month')">Month</button>
        <button onclick="updateChartView('year')">Year</button>
      </div>
    </section>

    <section class="bp-analysis">
      <h2>Trend Analysis</h2>
      <div id="trendAnalysis" class="analysis-card">
        <div class="trend-item">
          <h3>Time of Day Impact</h3>
          <div id="timeOfDayChart" class="mini-chart"></div>
        </div>
        <div class="trend-item">
          <h3>Activity Correlation</h3>
          <div id="activityChart" class="mini-chart"></div>
        </div>
        <div class="trend-item">
          <h3>Medication Effect</h3>
          <div id="medicationChart" class="mini-chart"></div>
        </div>
      </div>
    </section>

    <section class="bp-history">
      <h2>Recent Readings</h2>
      <div class="filter-controls">
        <label for="dateFilter">Filter by Date:</label>
        <input type="date" id="dateFilter" onchange="filterReadings()" />
        <select id="timeFilter" onchange="filterReadings()">
          <option value="all">All Times</option>
          <option value="morning">Morning</option>
          <option value="afternoon">Afternoon</option>
          <option value="evening">Evening</option>
          <option value="night">Night</option>
        </select>
      </div>
      <div id="readingsList" class="readings-list">
        <p>Loading readings...</p>
      </div>
      <button onclick="exportData()" class="export-btn">📥 Export Data</button>
    </section>

    <button onclick="window.location.href='index.html'" class="back-button">← Back to Home</button>
  </main>

  <!-- Edit Modal -->
  <div id="editModal" class="modal">
    <div class="modal-content">
      <h3>Edit Reading</h3>
      <form id="editForm" onsubmit="saveEdit(event)">
        <div class="input-group">
          <label for="editSystolic">Systolic</label>
          <input type="number" id="editSystolic" required min="60" max="250" />
        </div>
        <div class="input-group">
          <label for="editDiastolic">Diastolic</label>
          <input type="number" id="editDiastolic" required min="40" max="150" />
        </div>
        <div class="input-group">
          <label for="editPulse">Pulse Rate</label>
          <input type="number" id="editPulse" required min="40" max="200" />
        </div>
        <div class="input-group">
          <label for="editTimeOfDay">Time of Day</label>
          <select id="editTimeOfDay" required>
            <option value="morning">Morning</option>
            <option value="afternoon">Afternoon</option>
            <option value="evening">Evening</option>
            <option value="night">Night</option>
          </select>
        </div>
        <div class="input-group">
          <label for="editMedicationStatus">Medication Status</label>
          <select id="editMedicationStatus">
            <option value="taken">Taken as prescribed</option>
            <option value="missed">Missed dose</option>
            <option value="partial">Partial dose</option>
            <option value="na">Not applicable</option>
          </select>
        </div>
        <div class="input-group">
          <label for="editActivityLevel">Activity Level</label>
          <select id="editActivityLevel">
            <option value="resting">Resting</option>
            <option value="light">Light Activity</option>
            <option value="moderate">Moderate Activity</option>
            <option value="intense">Intense Activity</option>
          </select>
        </div>
        <div class="input-group">
          <label for="editNote">Notes</label>
          <textarea id="editNote" rows="3"></textarea>
        </div>
        <input type="hidden" id="editId" />
        <div class="form-actions">
          <button type="submit">Save Changes</button>
          <button type="button" onclick="modal.hide('editModal')">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let currentUser;
    let bpChart;
    let readings = [];
    let currentChartView = 'week';

    // Initialize page
    firebase.auth().onAuthStateChanged(user => {
      if (!user) return window.location.href = "login.html";
      currentUser = user;
      loadReadings();
    });

    async function loadReadings() {
      const spinner = loading.show(document.getElementById('readingsList'));
      
      try {
        const snapshot = await db.collection("bloodPressure")
          .where("uid", "==", currentUser.uid)
          .orderBy("timestamp", "desc")
          .limit(30)
          .get();

        readings = snapshot.docs.map(doc => ({
          id: doc.id,
          ...doc.data()
        }));

        updateReadingsList();
        updateTodaySummary();
        updateChart();
        updateTrendAnalysis();
      } catch (error) {
        toast.show("Error loading readings: " + error.message, "error");
      } finally {
        loading.hide(spinner);
      }
    }

    function updateReadingsList() {
      const listElement = document.getElementById("readingsList");
      if (readings.length === 0) {
        listElement.innerHTML = "<p>No readings found</p>";
        return;
      }

      const list = readings.map(reading => `
        <div class="reading-card ${getBPCategory(reading.systolic, reading.diastolic)}">
          <div class="reading-header">
            <span class="reading-time">${formatDateTime(reading.timestamp)}</span>
            <div class="reading-actions">
              <button onclick="editReading('${reading.id}')" aria-label="Edit reading">✏️</button>
              <button onclick="deleteReading('${reading.id}')" aria-label="Delete reading">🗑️</button>
            </div>
          </div>
          <div class="reading-values">
            <div class="value">
              <span class="label">Systolic</span>
              <span class="number">${reading.systolic}</span>
            </div>
            <div class="value">
              <span class="label">Diastolic</span>
              <span class="number">${reading.diastolic}</span>
            </div>
            <div class="value">
              <span class="label">Pulse</span>
              <span class="number">${reading.pulse}</span>
            </div>
          </div>
          <div class="reading-details">
            <span class="time-of-day">${reading.timeOfDay || 'N/A'}</span>
            <span class="activity-level">${reading.activityLevel || 'N/A'}</span>
            <span class="medication-status">${reading.medicationStatus || 'N/A'}</span>
          </div>
          ${reading.note ? `<div class="reading-note">${reading.note}</div>` : ''}
        </div>
      `).join('');

      listElement.innerHTML = list;
    }

    function updateTodaySummary() {
      const today = new Date().toISOString().split('T')[0];
      const todayReadings = readings.filter(r => r.date === today);
      
      if (todayReadings.length === 0) {
        document.getElementById('todaySummary').innerHTML = '<p>No readings for today</p>';
        return;
      }

      const latest = todayReadings[0];
      const status = getBPCategory(latest.systolic, latest.diastolic);
      const tip = getTips(status);

      const summary = `
        <div class="summary-content">
          <div class="latest-reading">
            <h3>Latest Reading</h3>
            <div class="reading-values">
              <div class="value">
                <span class="label">Systolic</span>
                <span class="number">${latest.systolic}</span>
              </div>
              <div class="value">
                <span class="label">Diastolic</span>
                <span class="number">${latest.diastolic}</span>
              </div>
              <div class="value">
                <span class="label">Pulse</span>
                <span class="number">${latest.pulse}</span>
              </div>
            </div>
          </div>
          <div class="status-info">
            <h3>Status</h3>
            <p class="status ${status.toLowerCase()}">${status}</p>
            <p class="tip">${tip}</p>
          </div>
          <div class="today-stats">
            <h3>Today's Stats</h3>
            <p>Readings: ${todayReadings.length}</p>
            <p>Average: ${calculateAverage(todayReadings)}</p>
          </div>
        </div>
      `;

      document.getElementById('todaySummary').innerHTML = summary;
    }

    function updateChart() {
      const ctx = document.getElementById('bpChart').getContext('2d');
      const data = prepareChartData();
      
      if (bpChart) {
        bpChart.destroy();
      }

      bpChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: data.labels,
          datasets: [
            {
              label: 'Systolic',
              data: data.systolic,
              borderColor: '#e53e3e',
              backgroundColor: 'rgba(229, 62, 62, 0.1)',
              fill: true
            },
            {
              label: 'Diastolic',
              data: data.diastolic,
              borderColor: '#3182ce',
              backgroundColor: 'rgba(49, 130, 206, 0.1)',
              fill: true
            },
            {
              label: 'Pulse',
              data: data.pulse,
              borderColor: '#38a169',
              backgroundColor: 'rgba(56, 161, 105, 0.1)',
              fill: true
            }
          ]
        },
        options: {
          responsive: true,
          interaction: {
            intersect: false,
            mode: 'index'
          },
          plugins: {
            legend: {
              position: 'bottom'
            },
            tooltip: {
              callbacks: {
                label: function(context) {
                  const label = context.dataset.label || '';
                  const value = context.parsed.y;
                  return `${label}: ${value}`;
                }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: false
            }
          }
        }
      });
    }

    function updateTrendAnalysis() {
      // Time of Day Analysis
      const timeOfDayData = analyzeTimeOfDay();
      new Chart(document.getElementById('timeOfDayChart'), {
        type: 'bar',
        data: {
          labels: ['Morning', 'Afternoon', 'Evening', 'Night'],
          datasets: [{
            label: 'Average Systolic',
            data: timeOfDayData.systolic,
            backgroundColor: 'rgba(229, 62, 62, 0.6)'
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false }
          }
        }
      });

      // Activity Level Analysis
      const activityData = analyzeActivityLevel();
      new Chart(document.getElementById('activityChart'), {
        type: 'bar',
        data: {
          labels: ['Resting', 'Light', 'Moderate', 'Intense'],
          datasets: [{
            label: 'Average BP',
            data: activityData,
            backgroundColor: 'rgba(49, 130, 206, 0.6)'
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false }
          }
        }
      });

      // Medication Effect Analysis
      const medicationData = analyzeMedicationEffect();
      new Chart(document.getElementById('medicationChart'), {
        type: 'bar',
        data: {
          labels: ['Taken', 'Missed', 'Partial', 'N/A'],
          datasets: [{
            label: 'Average BP',
            data: medicationData,
            backgroundColor: 'rgba(56, 161, 105, 0.6)'
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false }
          }
        }
      });
    }

    function prepareChartData() {
      const now = new Date();
      let startDate;
      
      switch(currentChartView) {
        case 'month':
          startDate = new Date(now.setMonth(now.getMonth() - 1));
          break;
        case 'year':
          startDate = new Date(now.setFullYear(now.getFullYear() - 1));
          break;
        default: // week
          startDate = new Date(now.setDate(now.getDate() - 7));
      }

      const filteredReadings = readings.filter(r => new Date(r.timestamp) >= startDate);
      
      return {
        labels: filteredReadings.map(r => formatDate(r.timestamp)),
        systolic: filteredReadings.map(r => r.systolic),
        diastolic: filteredReadings.map(r => r.diastolic),
        pulse: filteredReadings.map(r => r.pulse)
      };
    }

    function analyzeTimeOfDay() {
      const times = ['morning', 'afternoon', 'evening', 'night'];
      return {
        systolic: times.map(time => {
          const readings = this.readings.filter(r => r.timeOfDay === time);
          return readings.length ? 
            readings.reduce((sum, r) => sum + r.systolic, 0) / readings.length : 0;
        })
      };
    }

    function analyzeActivityLevel() {
      const levels = ['resting', 'light', 'moderate', 'intense'];
      return levels.map(level => {
        const readings = this.readings.filter(r => r.activityLevel === level);
        return readings.length ? 
          readings.reduce((sum, r) => sum + r.systolic, 0) / readings.length : 0;
      });
    }

    function analyzeMedicationEffect() {
      const statuses = ['taken', 'missed', 'partial', 'na'];
      return statuses.map(status => {
        const readings = this.readings.filter(r => r.medicationStatus === status);
        return readings.length ? 
          readings.reduce((sum, r) => sum + r.systolic, 0) / readings.length : 0;
      });
    }

    function updateChartView(view) {
      currentChartView = view;
      updateChart();
      
      // Update active button
      document.querySelectorAll('.chart-controls button').forEach(btn => {
        btn.classList.remove('active');
        if (btn.textContent.toLowerCase() === view) {
          btn.classList.add('active');
        }
      });
    }

    function exportData() {
      const csv = [
        ['Date', 'Time', 'Systolic', 'Diastolic', 'Pulse', 'Time of Day', 'Activity Level', 'Medication Status', 'Notes'],
        ...readings.map(r => [
          formatDate(r.timestamp),
          formatTime(r.timestamp),
          r.systolic,
          r.diastolic,
          r.pulse,
          r.timeOfDay || '',
          r.activityLevel || '',
          r.medicationStatus || '',
          r.note || ''
        ])
      ].map(row => row.join(',')).join('\n');

      const blob = new Blob([csv], { type: 'text/csv' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `bp-readings-${formatDate(new Date())}.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      window.URL.revokeObjectURL(url);
    }

    function getBPCategory(systolic, diastolic) {
      if (systolic >= 180 || diastolic >= 120) return "Crisis";
      if (systolic >= 140 || diastolic >= 90) return "Stage 2";
      if (systolic >= 130 || diastolic >= 80) return "Stage 1";
      if (systolic >= 120 && diastolic < 80) return "Elevated";
      return "Normal";
    }

    function getTips(status) {
      const tips = {
        Normal: "Keep up the healthy lifestyle!",
        Elevated: "Consider reducing salt intake and increasing activity.",
        "Stage 1": "Monitor regularly and consider seeing a provider.",
        "Stage 2": "High BP detected — consult a doctor.",
        Crisis: "Immediate medical attention is needed!"
      };
      return tips[status] || "";
    }

    function calculateAverage(readings) {
      if (!readings.length) return "N/A";
      const avgSystolic = readings.reduce((sum, r) => sum + r.systolic, 0) / readings.length;
      const avgDiastolic = readings.reduce((sum, r) => sum + r.diastolic, 0) / readings.length;
      return `${Math.round(avgSystolic)}/${Math.round(avgDiastolic)}`;
    }

    function formatDate(timestamp) {
      return new Date(timestamp).toLocaleDateString();
    }

    function formatTime(timestamp) {
      return new Date(timestamp).toLocaleTimeString();
    }

    function formatDateTime(timestamp) {
      return `${formatDate(timestamp)} ${formatTime(timestamp)}`;
    }

    async function logBloodPressure(event) {
      event.preventDefault();
      const spinner = loading.show(document.getElementById('logBpBtn'));

      const reading = {
        systolic: parseInt(document.getElementById("systolic").value),
        diastolic: parseInt(document.getElementById("diastolic").value),
        pulse: parseInt(document.getElementById("pulse").value),
        timeOfDay: document.getElementById("timeOfDay").value,
        medicationStatus: document.getElementById("medicationStatus").value,
        activityLevel: document.getElementById("activityLevel").value,
        note: document.getElementById("bpNote").value.trim(),
        date: new Date().toISOString().split('T')[0],
        timestamp: new Date(),
        uid: currentUser.uid
      };

      try {
        await db.collection("bloodPressure").add(reading);
        document.getElementById("bpForm").reset();
        toast.show("Blood pressure reading logged successfully!");
        await loadReadings();
      } catch (error) {
        toast.show("Error logging reading: " + error.message, "error");
      } finally {
        loading.hide(spinner);
      }
    }

    function editReading(id) {
      const reading = readings.find(r => r.id === id);
      if (!reading) return;

      document.getElementById("editId").value = id;
      document.getElementById("editSystolic").value = reading.systolic;
      document.getElementById("editDiastolic").value = reading.diastolic;
      document.getElementById("editPulse").value = reading.pulse;
      document.getElementById("editTimeOfDay").value = reading.timeOfDay || "morning";
      document.getElementById("editMedicationStatus").value = reading.medicationStatus || "taken";
      document.getElementById("editActivityLevel").value = reading.activityLevel || "resting";
      document.getElementById("editNote").value = reading.note || "";
      modal.show('editModal');
    }

    async function saveEdit(event) {
      event.preventDefault();
      const spinner = loading.show(event.target);

      const id = document.getElementById("editId").value;
      const reading = {
        systolic: parseInt(document.getElementById("editSystolic").value),
        diastolic: parseInt(document.getElementById("editDiastolic").value),
        pulse: parseInt(document.getElementById("editPulse").value),
        timeOfDay: document.getElementById("editTimeOfDay").value,
        medicationStatus: document.getElementById("editMedicationStatus").value,
        activityLevel: document.getElementById("editActivityLevel").value,
        note: document.getElementById("editNote").value.trim(),
        updatedAt: new Date()
      };

      try {
        await db.collection("bloodPressure").doc(id).update(reading);
        modal.hide('editModal');
        toast.show("Reading updated successfully!");
        await loadReadings();
      } catch (error) {
        toast.show("Error updating reading: " + error.message, "error");
      } finally {
        loading.hide(spinner);
      }
    }

    async function deleteReading(id) {
      if (!confirm("Are you sure you want to delete this reading?")) return;
      
      const spinner = loading.show(document.getElementById('readingsList'));
      
      try {
        await db.collection("bloodPressure").doc(id).delete();
        toast.show("Reading deleted successfully!");
        await loadReadings();
      } catch (error) {
        toast.show("Error deleting reading: " + error.message, "error");
      } finally {
        loading.hide(spinner);
      }
    }

    function filterReadings() {
      const date = document.getElementById("dateFilter").value;
      const time = document.getElementById("timeFilter").value;
      const filteredReadings = date
        ? readings.filter(r => r.date === date && (time === "all" || r.timeOfDay === time))
        : readings.filter(r => time === "all" || r.timeOfDay === time);
      
      const listElement = document.getElementById("readingsList");
      if (filteredReadings.length === 0) {
        listElement.innerHTML = "<p>No readings found for selected date and time</p>";
        return;
      }

      updateReadingsList(filteredReadings);
    }
  </script>
</body>
</html>
