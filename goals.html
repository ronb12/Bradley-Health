<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎯 Health Goals</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="firebase-init.js"></script>

  <style>
    body { font-family: Arial, sans-serif; background: #f0f4f8; padding: 2em; }
    h1 { color: #2c7a7b; }
    input, button {
      display: block; margin: 0.8em 0; padding: 0.7em; width: 100%;
      border-radius: 8px; border: 1px solid #ccc;
    }
    button {
      background-color: #2c7a7b; color: white; cursor: pointer;
    }
    .goal-item {
      background: white; padding: 1em; border-radius: 10px;
      margin-bottom: 1em;
    }
    .goal-item.completed { opacity: 0.6; text-decoration: line-through; }
    canvas { background: white; border-radius: 10px; padding: 1em; margin-top: 2em; }
  </style>
</head>
<body>
  <h1>🎯 My Health Goals</h1>

  <input type="text" id="goalDesc" placeholder="Enter a goal (e.g. Walk 30 minutes)">
  <input type="date" id="goalDueDate">
  <button onclick="addGoal()">Add Goal</button>
  <button onclick="exportGoals()">📄 Export Goals as PDF</button>
  <button onclick="location.href='index.html'">← Back to Home</button>

  <div id="goalList">Loading...</div>
  <canvas id="weeklyChart" height="100"></canvas>

  <script>
    const db = firebase.firestore();
    let user;

    firebase.auth().onAuthStateChanged(u => {
      if (!u) return window.location.href = "login.html";
      user = u;
      loadGoals();
    });

    function addGoal() {
      const desc = document.getElementById("goalDesc").value.trim();
      const due = document.getElementById("goalDueDate").value;
      if (!desc) return alert("Please enter a goal.");
      db.collection("goals").add({
        uid: user.uid, description: desc, dueDate: due,
        completed: false, timestamp: new Date()
      }).then(() => {
        document.getElementById("goalDesc").value = "";
        document.getElementById("goalDueDate").value = "";
        loadGoals();
      });
    }

    function loadGoals() {
      db.collection("goals")
        .where("uid", "==", user.uid)
        .orderBy("timestamp", "desc")
        .onSnapshot(snapshot => {
          const list = document.getElementById("goalList");
          list.innerHTML = "";
          const weeklyCounts = Array(7).fill(0);
          const labels = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

          snapshot.forEach(doc => {
            const goal = doc.data();
            const id = doc.id;
            const div = document.createElement("div");
            div.className = "goal-item" + (goal.completed ? " completed" : "");
            div.innerHTML = `
              <input type="text" value="${goal.description}" onchange="editGoal('${id}', 'description', this.value)" />
              <input type="date" value="${goal.dueDate || ''}" onchange="editGoal('${id}', 'dueDate', this.value)" />
              <label><input type="checkbox" ${goal.completed ? "checked" : ""} onchange="editGoal('${id}', 'completed', this.checked)"> Complete</label>
              <button onclick="deleteGoal('${id}')">❌ Delete</button>
            `;
            list.appendChild(div);

            const day = new Date(goal.timestamp.toDate()).getDay();
            if (goal.completed) weeklyCounts[day]++;
          });
          drawWeeklyChart(labels, weeklyCounts);
        });
    }

    function editGoal(id, field, value) {
      db.collection("goals").doc(id).update({ [field]: value });
    }

    function deleteGoal(id) {
      if (confirm("Delete this goal?")) {
        db.collection("goals").doc(id).delete();
      }
    }

    function exportGoals() {
      db.collection("goals")
        .where("uid", "==", user.uid)
        .orderBy("timestamp", "desc")
        .get().then(snapshot => {
          const { jsPDF } = window.jspdf;
          const doc = new jsPDF();
          doc.setFontSize(16);
          doc.text("Health Goals", 10, 10);
          let y = 20;
          snapshot.forEach(docSnap => {
            const g = docSnap.data();
            doc.setFontSize(12);
            doc.text(`• ${g.description} (Due: ${g.dueDate || "N/A"}) - ${g.completed ? "✅" : "❌"}`, 10, y);
            y += 10;
          });
          doc.save("health_goals.pdf");
        });
    }

    function drawWeeklyChart(labels, values) {
      const ctx = document.getElementById("weeklyChart").getContext("2d");
      if (window.goalChart) window.goalChart.destroy();
      window.goalChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            label: 'Completed Goals',
            data: values,
            backgroundColor: '#2c7a7b'
          }]
        },
        options: {
          scales: {
            y: {
              beginAtZero: true,
              stepSize: 1
            }
          }
        }
      });
    }
  </script>
</body>
</html>
