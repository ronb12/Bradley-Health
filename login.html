<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#1a56db"/>
  <meta name="description" content="Login to your Bradley Health account"/>
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32x32.png"/>
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/favicon-16x16.png"/>
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png"/>
  <link rel="manifest" href="/manifest.json"/>
  
  <title>Login - Bradley Health</title>
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="stylesheet" href="assets/mobile.css" media="(max-width: 480px)">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  
  <!-- Application Scripts -->
  <script src="assets/js/firebase-config.js"></script>
  <script src="assets/js/firebase-init.js"></script>
  <script src="assets/js/notification-manager.js"></script>
</head>
<body>
  <div class="container">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <h1>Welcome Back</h1>
          <p class="auth-subtitle">Sign in to your Bradley Health account</p>
        </div>

        <form id="loginForm" class="auth-form">
          <div class="form-group">
            <label for="email" class="form-label">Email</label>
            <div class="input-group">
              <i class="fas fa-envelope input-icon"></i>
              <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
            </div>
          </div>

          <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
              <i class="fas fa-lock input-icon"></i>
              <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
              <button type="button" class="toggle-password" onclick="togglePassword()">
                <i class="fas fa-eye"></i>
              </button>
            </div>
          </div>

          <div class="form-options">
            <label class="checkbox-label">
              <input type="checkbox" id="rememberMe">
              <span>Remember me</span>
            </label>
            <a href="#" class="forgot-password">Forgot password?</a>
          </div>

          <button type="submit" class="btn btn-primary btn-block">
            <i class="fas fa-sign-in-alt"></i>
            Sign In
          </button>
        </form>

        <div class="auth-divider">
          <span>or continue with</span>
        </div>

        <div class="social-auth">
          <button class="btn btn-social btn-google" onclick="signInWithGoogle()">
            <i class="fab fa-google"></i>
            Google
          </button>
          <button class="btn btn-social btn-apple" onclick="signInWithApple()">
            <i class="fab fa-apple"></i>
            Apple
          </button>
        </div>

        <div class="auth-footer">
          <p>Don't have an account? <a href="signup.html" class="auth-link">Sign up</a></p>
        </div>
      </div>
    </div>
  </div>

  <div id="mobileToast" class="mobile-toast"></div>
  <div id="loadingOverlay" class="loading-overlay" style="display: none;">
    <div class="loading-spinner"></div>
    <p>Signing in...</p>
  </div>

  <script>
    let notificationManager;

    // Wait for all scripts to load
    window.addEventListener('load', async () => {
      try {
        // Initialize Firebase
        await window.initializeFirebase();
        
        // Initialize notification manager
        notificationManager = new NotificationManager();

        // Set up form submission
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', handleLogin);

        // Check for saved email
        const savedEmail = localStorage.getItem('rememberedEmail');
        if (savedEmail) {
          document.getElementById('email').value = savedEmail;
          document.getElementById('rememberMe').checked = true;
        }
      } catch (error) {
        console.error('❌ Initialization error:', error);
        document.body.innerHTML = `
          <div class="error-message">
            <h2>Error Loading Application</h2>
            <p>${error.message}</p>
            <p>Please try refreshing the page or contact support if the problem persists.</p>
          </div>
        `;
      }
    });

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const rememberMe = document.getElementById('rememberMe').checked;

      try {
        showLoading();
        const userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
        
        if (rememberMe) {
          localStorage.setItem('rememberedEmail', email);
        } else {
          localStorage.removeItem('rememberedEmail');
        }

        notificationManager.showToast('Successfully signed in!', 'success');
        window.location.href = 'dashboard.html';
      } catch (error) {
        console.error('❌ Login error:', error);
        notificationManager.showToast(error.message, 'error');
      } finally {
        hideLoading();
      }
    }

    async function signInWithGoogle() {
      try {
        showLoading();
        const provider = new firebase.auth.GoogleAuthProvider();
        await firebase.auth().signInWithPopup(provider);
        notificationManager.showToast('Successfully signed in with Google!', 'success');
        window.location.href = 'dashboard.html';
      } catch (error) {
        console.error('❌ Google sign-in error:', error);
        notificationManager.showToast(error.message, 'error');
      } finally {
        hideLoading();
      }
    }

    async function signInWithApple() {
      try {
        showLoading();
        const provider = new firebase.auth.OAuthProvider('apple.com');
        await firebase.auth().signInWithPopup(provider);
        notificationManager.showToast('Successfully signed in with Apple!', 'success');
        window.location.href = 'dashboard.html';
      } catch (error) {
        console.error('❌ Apple sign-in error:', error);
        notificationManager.showToast(error.message, 'error');
      } finally {
        hideLoading();
      }
    }

    function togglePassword() {
      const passwordInput = document.getElementById('password');
      const toggleButton = document.querySelector('.toggle-password i');
      
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleButton.classList.remove('fa-eye');
        toggleButton.classList.add('fa-eye-slash');
      } else {
        passwordInput.type = 'password';
        toggleButton.classList.remove('fa-eye-slash');
        toggleButton.classList.add('fa-eye');
      }
    }

    function showLoading() {
      document.getElementById('loadingOverlay').style.display = 'flex';
    }

    function hideLoading() {
      document.getElementById('loadingOverlay').style.display = 'none';
    }
  </script>
</body>
</html>
