<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#2c7a7b"/>
  <meta name="description" content="Bradley Health - Your Personal Health Companion"/>
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png"/>
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png"/>
  <link rel="manifest" href="manifest.json"/>
  
  <title>Login - Bradley Health</title>
  <link rel="stylesheet" href="assets/style.css" />
  
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-auth.js"></script>
  <script src="firebase-init.js"></script>
</head>
<body>
  <header>
    <h1>Bradley Health</h1>
    <p>Your Personal Health Companion</p>
  </header>

  <main>
    <section class="card">
      <h2>Login</h2>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required />
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required />
        </div>
        
        <button type="submit">Login</button>
      </form>
      <p class="text-center mt-2">
        Don't have an account? <a href="#" id="showSignup">Sign up</a>
      </p>
    </section>

    <section class="card" id="signupSection" style="display: none;">
      <h2>Sign Up</h2>
      <form id="signupForm">
        <div class="form-group">
          <label for="signupEmail">Email</label>
          <input type="email" id="signupEmail" required />
        </div>
        <div class="form-group">
          <label for="signupPassword">Password</label>
          <input type="password" id="signupPassword" required minlength="6" />
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" required minlength="6" />
        </div>
        <button type="submit">Sign Up</button>
      </form>
      <p class="text-center mt-2">
        Already have an account? <a href="#" id="showLogin">Login</a>
      </p>
    </section>
  </main>

  <script>
    // Initialize Firebase
    const auth = firebase.auth();

    // Toggle between login and signup forms
    document.getElementById('showSignup').addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById('loginForm').parentElement.style.display = 'none';
      document.getElementById('signupSection').style.display = 'block';
    });

    document.getElementById('showLogin').addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById('signupSection').style.display = 'none';
      document.getElementById('loginForm').parentElement.style.display = 'block';
    });

    // Login form submission
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      try {
        await auth.signInWithEmailAndPassword(email, password);
        window.location.href = 'dashboard.html';
      } catch (error) {
        console.error('Login error:', error);
        alert(error.message);
      }
    });

    // Signup form submission
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('signupEmail').value;
      const password = document.getElementById('signupPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      
      if (password !== confirmPassword) {
        alert('Passwords do not match');
        return;
      }
      
      try {
        await auth.createUserWithEmailAndPassword(email, password);
        window.location.href = 'dashboard.html';
      } catch (error) {
        console.error('Signup error:', error);
        alert(error.message);
      }
    });

    // Check if user is already logged in
    auth.onAuthStateChanged(user => {
      if (user) {
        window.location.href = 'dashboard.html';
      }
    });
  </script>
</body>
</html>
