<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#1a56db"/>
  <meta name="description" content="Login to Bradley Health"/>
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32x32.png"/>
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/favicon-16x16.png"/>
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png"/>
  <link rel="manifest" href="/manifest.json"/>
  
  <title>Login - Bradley Health</title>
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="stylesheet" href="assets/mobile.css" media="(max-width: 480px)">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
  
  <!-- Application Scripts -->
  <script src="assets/js/firebase-config.js"></script>
  <script src="assets/js/notification-manager.js"></script>
</head>
<body>
  <div class="container">
    <div class="login-container">
      <div class="login-header">
        <h1>Welcome Back</h1>
        <p>Sign in to access your health dashboard</p>
      </div>
      
      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required />
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required />
        </div>
        
        <button type="submit" class="btn btn-primary">Sign In</button>
        
        <div class="form-footer">
          <a href="forgot-password.html">Forgot Password?</a>
          <a href="register.html">Create Account</a>
        </div>
      </form>
    </div>
  </div>

  <div id="mobileToast" class="mobile-toast"></div>

  <script>
    // Initialize managers
    let notificationManager;

    // Wait for all scripts to load
    window.addEventListener('load', async () => {
      try {
        // Check if Firebase is loaded
        if (typeof firebase === 'undefined') {
          throw new Error('Firebase SDK not loaded');
        }

        // Check if Firebase config is available
        if (typeof firebaseConfig === 'undefined') {
          throw new Error('Firebase configuration is missing');
        }

        // Initialize Firebase if not already initialized
        if (!firebase.apps.length) {
          firebase.initializeApp(firebaseConfig);
          console.log('✅ Firebase initialized successfully');
        }

        // Initialize notification manager
        notificationManager = new NotificationManager();

        // Set up login form
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          
          const email = document.getElementById('email').value;
          const password = document.getElementById('password').value;
          
          try {
            const userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
            window.location.href = 'dashboard.html';
          } catch (error) {
            console.error('Login error:', error);
            notificationManager.showToast(error.message, 'error');
          }
        });

        // Check if user is already logged in
        firebase.auth().onAuthStateChanged(user => {
          if (user) {
            window.location.href = 'dashboard.html';
          }
        });
      } catch (error) {
        console.error('❌ Initialization error:', error);
        document.body.innerHTML = `
          <div class="error-message">
            <h2>Error Loading Application</h2>
            <p>${error.message}</p>
            <p>Please try refreshing the page or contact support if the problem persists.</p>
          </div>
        `;
      }
    });
  </script>
</body>
</html>
