<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mood Tracker</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="firebase-init.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      padding: 2em;
    }
    h1 {
      color: #2c7a7b;
    }
    select, textarea, button {
      display: block;
      width: 100%;
      margin: 1em 0;
      padding: 0.8em;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    button {
      background: #2c7a7b;
      color: white;
      border: none;
      cursor: pointer;
    }
    canvas {
      margin-top: 2em;
      background: white;
      border-radius: 10px;
      padding: 1em;
    }
    table {
      width: 100%;
      margin-top: 2em;
      border-collapse: collapse;
    }
    th, td {
      padding: 0.75em;
      border: 1px solid #ccc;
    }
    #logTable th {
      background: #2c7a7b;
      color: white;
    }
  </style>
</head>
<body>
  <h1>😊 Mood Tracker</h1>

  <select id="moodRating">
    <option value="">Select Mood (1-5)</option>
    <option value="1">😟 Very Bad</option>
    <option value="2">😕 Bad</option>
    <option value="3">😐 Okay</option>
    <option value="4">🙂 Good</option>
    <option value="5">😃 Excellent</option>
  </select>

  <textarea id="moodNote" placeholder="Optional note about today..."></textarea>
  <button onclick="addMood()">Log Mood</button>
  <button onclick="exportPDF()">📄 Export Mood Log</button>

  <canvas id="moodChart"></canvas>

  <table id="logTable">
    <thead>
      <tr><th>Date</th><th>Mood</th><th>Note</th></tr>
    </thead>
    <tbody id="logBody"></tbody>
  </table>

  <script>
    firebase.auth().onAuthStateChanged(user => {
      if (!user) return window.location.href = "login.html";
      currentUser = user;
      loadMoods();
    });

    function addMood() {
      const rating = parseInt(document.getElementById("moodRating").value);
      const note = document.getElementById("moodNote").value.trim();
      const today = new Date().toISOString().split("T")[0];

      if (!rating) return alert("Please select a mood.");

      db.collection("moods").add({
        uid: currentUser.uid,
        rating,
        note,
        date: today,
        timestamp: new Date()
      }).then(() => {
        document.getElementById("moodRating").value = "";
        document.getElementById("moodNote").value = "";
        loadMoods();
      });
    }

    function loadMoods() {
      db.collection("moods")
        .where("uid", "==", currentUser.uid)
        .orderBy("date", "desc")
        .limit(7)
        .get()
        .then(snapshot => {
          const labels = [], values = [], logRows = [];

          snapshot.forEach(doc => {
            const { date, rating, note } = doc.data();
            labels.unshift(date);
            values.unshift(rating);
            logRows.unshift(`<tr><td>${date}</td><td>${emojiMood(rating)}</td><td>${note || "-"}</td></tr>`);
          });

          document.getElementById("logBody").innerHTML = logRows.join("");
          drawChart(labels, values);
        });
    }

    function emojiMood(rating) {
      return ["😟","😕","😐","🙂","😃"][rating-1] || "";
    }

    function drawChart(labels, values) {
      const ctx = document.getElementById("moodChart").getContext("2d");
      if (window.moodChart) window.moodChart.destroy();

      window.moodChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: 'Mood (1–5)',
            data: values,
            tension: 0.3,
            borderWidth: 2,
            fill: false,
            borderColor: '#2c7a7b'
          }]
        },
        options: {
          scales: {
            y: {
              beginAtZero: true,
              min: 1,
              max: 5,
              ticks: { stepSize: 1 }
            }
          }
        }
      });
    }

    async function exportPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const rows = document.querySelectorAll("#logBody tr");

      doc.setFontSize(18);
      doc.text("Mood Log", 14, 16);
      doc.setFontSize(12);

      let y = 24;
      rows.forEach(tr => {
        const cells = tr.querySelectorAll("td");
        const row = [...cells].map(td => td.innerText).join(" | ");
        doc.text(row, 14, y);
        y += 8;
      });

      doc.save("mood-log.pdf");
    }
  </script>
</body>
</html>
