<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mood Tracker</title>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="firebase-init.js"></script> <!-- ✅ Root-level init -->

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      padding: 2em;
    }
    h1 {
      color: #2c7a7b;
    }
    select, textarea, button {
      display: block;
      width: 100%;
      margin: 1em 0;
      padding: 0.8em;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    button {
      background: #2c7a7b;
      color: white;
      border: none;
      cursor: pointer;
    }
    canvas {
      margin-top: 2em;
      background: white;
      border-radius: 10px;
      padding: 1em;
    }
  </style>
</head>
<body>
  <h1>😊 Mood Tracker</h1>

  <select id="moodRating">
    <option value="">Select Mood (1-5)</option>
    <option value="1">😟 Very Bad</option>
    <option value="2">😕 Bad</option>
    <option value="3">😐 Okay</option>
    <option value="4">🙂 Good</option>
    <option value="5">😃 Excellent</option>
  </select>

  <textarea id="moodNote" placeholder="Optional note about today..."></textarea>
  <button onclick="addMood()">Log Mood</button>

  <canvas id="moodChart"></canvas>

  <script>
    let currentUser;

    firebase.auth().onAuthStateChanged(user => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }
      currentUser = user;
      loadMoods();
    });

    function addMood() {
      const rating = parseInt(document.getElementById("moodRating").value);
      const note = document.getElementById("moodNote").value.trim();
      const today = new Date().toISOString().split("T")[0];

      if (!rating) {
        alert("Please select a mood.");
        return;
      }

      db.collection("moods").add({
        uid: currentUser.uid,
        rating,
        note,
        date: today,
        timestamp: new Date()
      }).then(() => {
        document.getElementById("moodRating").value = "";
        document.getElementById("moodNote").value = "";
        loadMoods();
      });
    }

    function loadMoods() {
      db.collection("moods")
        .where("uid", "==", currentUser.uid)
        .orderBy("date", "desc")
        .limit(7)
        .get()
        .then(snapshot => {
          const labels = [];
          const values = [];

          snapshot.forEach(doc => {
            const mood = doc.data();
            labels.unshift(mood.date);
            values.unshift(mood.rating);
          });

          // Delay rendering slightly for canvas readiness
          setTimeout(() => drawChart(labels, values), 100);
        })
        .catch(error => {
          console.error("❌ Failed to load moods:", error);
        });
    }

    function drawChart(labels, values) {
      const ctx = document.getElementById("moodChart").getContext("2d");

      if (window.moodChart) {
        window.moodChart.destroy();
      }

      window.moodChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: 'Mood (1–5)',
            data: values,
            tension: 0.3,
            borderWidth: 2,
            fill: false,
            borderColor: '#2c7a7b'
          }]
        },
        options: {
          responsive: true,
          scales: {
            y: {
              beginAtZero: true,
              min: 1,
              max: 5,
              ticks: { stepSize: 1 }
            }
          }
        }
      });
    }
  </script>
</body>
</html>
