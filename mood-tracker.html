<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>😊 Mood Tracker</title>

  <!-- Firebase & Chart.js -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="firebase-init.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: var(--bg, #f0f4f8);
      color: var(--text, #000);
      padding: 2em;
    }
    h1 { color: #2c7a7b; }
    select, textarea, button {
      display: block;
      width: 100%;
      margin: 1em 0;
      padding: 0.8em;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    button {
      background: #2c7a7b;
      color: white;
      border: none;
      cursor: pointer;
    }
    canvas {
      margin-top: 2em;
      background: white;
      border-radius: 10px;
      padding: 1em;
    }
    table {
      width: 100%;
      margin-top: 1em;
      border-collapse: collapse;
    }
    th, td {
      padding: 0.75em;
      border-bottom: 1px solid #ccc;
      text-align: left;
    }
    .back-button {
      background: #4a5568;
      margin-top: 2em;
    }
    .toggle-dark {
      position: absolute;
      top: 1em;
      right: 1em;
      padding: 0.5em;
      border-radius: 6px;
      background: #ccc;
      border: none;
    }
  </style>
</head>
<body>
  <button class="toggle-dark" onclick="toggleDarkMode()">🌓</button>
  <h1>😊 Mood Tracker</h1>

  <select id="moodRating">
    <option value="">Select Mood (1-5)</option>
    <option value="1">😟 Very Bad</option>
    <option value="2">😕 Bad</option>
    <option value="3">😐 Okay</option>
    <option value="4">🙂 Good</option>
    <option value="5">😃 Excellent</option>
  </select>

  <textarea id="moodNote" placeholder="Optional note about today..."></textarea>
  <button onclick="addMood()">Log Mood</button>
  <button onclick="exportMoodLog()">📄 Export Mood Log</button>

  <h3 id="weeklySummary"></h3>
  <canvas id="moodChart" height="100"></canvas>

  <table>
    <thead><tr><th>Date</th><th>Mood</th><th>Note</th></tr></thead>
    <tbody id="moodLogTable"></tbody>
  </table>

  <button onclick="window.location.href='index.html'" class="back-button">← Back to Home</button>

  <script>
    let db = firebase.firestore();
    let currentUser;
    let moodData = [];

    firebase.auth().onAuthStateChanged(user => {
      if (!user) return window.location.href = "login.html";
      currentUser = user;
      loadMoods();
    });

    function addMood() {
      const rating = parseInt(document.getElementById("moodRating").value);
      const note = document.getElementById("moodNote").value.trim();
      const today = new Date().toISOString().split("T")[0];

      if (!rating) return alert("Please select a mood.");

      db.collection("moods").add({
        uid: currentUser.uid,
        rating,
        note,
        date: today,
        timestamp: new Date()
      }).then(() => {
        document.getElementById("moodRating").value = "";
        document.getElementById("moodNote").value = "";
        loadMoods();
      }).catch(err => alert("Error logging mood: " + err.message));
    }

    function loadMoods() {
      db.collection("moods")
        .where("uid", "==", currentUser.uid)
        .orderBy("date", "desc")
        .limit(7)
        .get()
        .then(snapshot => {
          const labels = [], values = [], logRows = [];
          moodData = [];

          snapshot.forEach(doc => {
            const mood = doc.data();
            labels.unshift(mood.date);
            values.unshift(mood.rating);
            moodData.push(mood);
            logRows.push(`<tr><td>${mood.date}</td><td>${getEmoji(mood.rating)} (${mood.rating})</td><td>${mood.note || ""}</td></tr>`);
          });

          drawChart(labels, values);
          document.getElementById("moodLogTable").innerHTML = logRows.join("");
          updateWeeklySummary();
        }).catch(err => alert("Error loading moods: " + err.message));
    }

    function getEmoji(rating) {
      return ["😟", "😕", "😐", "🙂", "😃"][rating - 1] || "";
    }

    function drawChart(labels, values) {
      const ctx = document.getElementById("moodChart").getContext("2d");
      if (window.moodChart instanceof Chart) {
        window.moodChart.destroy();
      }

      window.moodChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: 'Mood (1–5)',
            data: values,
            tension: 0.3,
            borderWidth: 2,
            fill: false,
            pointStyle: 'circle',
            pointRadius: 6,
            pointHoverRadius: 8
          }]
        },
        options: {
          scales: {
            y: {
              min: 1,
              max: 5,
              ticks: {
                stepSize: 1,
                callback: val => getEmoji(Math.round(val))
              }
            }
          }
        }
      });
    }

    function updateWeeklySummary() {
      if (moodData.length === 0) return;
      const avg = (moodData.reduce((sum, m) => sum + m.rating, 0) / moodData.length).toFixed(2);
      document.getElementById("weeklySummary").textContent = `Weekly Average Mood: ${avg} ${getEmoji(Math.round(avg))}`;
    }

    function exportMoodLog() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.setFontSize(18);
      doc.text("Mood Log", 14, 20);
      doc.setFontSize(12);
      let y = 30;
      moodData.forEach(entry => {
        doc.text(`${entry.date} — ${getEmoji(entry.rating)} (${entry.rating})`, 14, y);
        if (entry.note) {
          doc.setFontSize(10);
          doc.text(`Note: ${entry.note}`, 18, y + 6);
          doc.setFontSize(12);
          y += 12;
        } else {
          y += 8;
        }
        if (y > 270) { doc.addPage(); y = 20; }
      });
      doc.save("mood_log.pdf");
    }

    function toggleDarkMode() {
      const isDark = document.body.classList.toggle("dark");
      document.documentElement.style.setProperty('--bg', isDark ? '#1a202c' : '#f0f4f8');
      document.documentElement.style.setProperty('--text', isDark ? '#fff' : '#000');
    }
  </script>
</body>
</html>
