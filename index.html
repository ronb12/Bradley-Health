<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bradley Health</title>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="firebase-init.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      margin: 0;
      text-align: center;
      padding: 2em;
    }

    header {
      background-color: #2c7a7b;
      color: white;
      padding: 1.5em;
      border-radius: 12px;
    }

    .button {
      display: block;
      width: 90%;
      max-width: 300px;
      margin: 1em auto;
      padding: 1em;
      font-size: 1.1em;
      background-color: #3182ce;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
    }

    .logout, .profile {
      background-color: #2c7a7b;
    }

    label {
      display: block;
      margin-top: 1em;
      font-size: 0.9em;
    }

    /* Dark Mode */
    body.dark {
      background-color: #1e1e1e;
      color: white;
    }
    body.dark header {
      background-color: #1a202c;
    }
    body.dark .button {
      background-color: #4a5568;
      color: white;
    }
    body.dark .logout, body.dark .profile {
      background-color: #2d3748;
    }
  </style>
</head>
<body>
  <header>
    <h1>Bradley Health</h1>
    <p id="welcome">Welcome to your dashboard</p>
    <label>
      🌙 Dark Mode:
      <input type="checkbox" id="darkToggle" />
    </label>
  </header>

  <a class="button" href="mood-tracker.html">Mood Tracker</a>
  <a class="button" href="goals.html">Health Goals</a>
  <a class="button" href="medications.html">Medication Tracker</a>
  <a class="button" href="visits.html">Doctor Visit Log</a>
  <a class="button" href="daily-summary.html">📊 Daily Summary</a>
  <a class="button" href="export.html">📥 Export My Data</a>

  <button class="button profile" onclick="openProfile()">👤 Profile</button>
  <button class="button logout" onclick="logout()">🔓 Logout</button>

  <script>
    // Firebase globals from firebase-init.js
    // db, auth, currentUser assumed

    // Auth check + greeting
    firebase.auth().onAuthStateChanged(user => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = user;
      db.collection("users").doc(user.uid).get().then(doc => {
        if (doc.exists && doc.data().name) {
          document.getElementById("welcome").textContent = `Welcome, ${doc.data().name}`;
        }
      });
    });

    // Logout
    function logout() {
      firebase.auth().signOut().then(() => {
        window.location.href = "login.html";
      });
    }

    // Dark Mode Toggle
    const toggle = document.getElementById("darkToggle");
    const body = document.body;

    if (localStorage.getItem("darkMode") === "true") {
      body.classList.add("dark");
      toggle.checked = true;
    }

    toggle.addEventListener("change", () => {
      if (toggle.checked) {
        body.classList.add("dark");
        localStorage.setItem("darkMode", "true");
      } else {
        body.classList.remove("dark");
        localStorage.setItem("darkMode", "false");
      }
    });

    // Optional placeholder for profile modal support
    function openProfile() {
      alert("Profile modal not yet implemented on this page.");
    }
  </script>
</body>
</html>
