<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="1920" viewBox="0 0 1080 1920" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="1080" height="1920" fill="#F7FAFC"/>
    
    <!-- Status Bar -->
    <rect width="1080" height="60" fill="#2B6CB0"/>
    <text x="40" y="40" font-family="system-ui" font-size="24" fill="#FFFFFF">9:41</text>
    <text x="1040" y="40" font-family="system-ui" font-size="24" fill="#FFFFFF" text-anchor="end">100%</text>
    
    <!-- Header -->
    <rect y="60" width="1080" height="120" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="40" y="140" font-family="system-ui" font-size="32" font-weight="bold" fill="#2D3748">Mood Tracker</text>
    
    <!-- Current Mood -->
    <rect x="40" y="200" width="1000" height="300" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="80" y="280" font-family="system-ui" font-size="24" font-weight="bold" fill="#2D3748">How are you feeling?</text>
    
    <!-- Mood Emojis -->
    <text x="216" y="380" font-family="system-ui" font-size="48" fill="#718096" text-anchor="middle">😢</text>
    <text x="324" y="380" font-family="system-ui" font-size="48" fill="#718096" text-anchor="middle">😕</text>
    <text x="432" y="380" font-family="system-ui" font-size="48" fill="#718096" text-anchor="middle">😐</text>
    <text x="540" y="380" font-family="system-ui" font-size="48" fill="#2B6CB0" text-anchor="middle">🙂</text>
    <text x="648" y="380" font-family="system-ui" font-size="48" fill="#718096" text-anchor="middle">😄</text>
    <text x="756" y="380" font-family="system-ui" font-size="48" fill="#718096" text-anchor="middle">🤩</text>
    
    <!-- Mood Factors -->
    <rect x="40" y="520" width="1000" height="400" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="80" y="600" font-family="system-ui" font-size="24" font-weight="bold" fill="#2D3748">What's affecting your mood?</text>
    
    <!-- Factor Items -->
    <rect x="80" y="640" width="920" height="80" rx="8" fill="#F7FAFC"/>
    <text x="140" y="690" font-family="system-ui" font-size="20" fill="#2D3748">Sleep Quality</text>
    <text x="940" y="690" font-family="system-ui" font-size="20" fill="#38A169" text-anchor="end">Good</text>
    
    <rect x="80" y="740" width="920" height="80" rx="8" fill="#F7FAFC"/>
    <text x="140" y="790" font-family="system-ui" font-size="20" fill="#2D3748">Stress Level</text>
    <text x="940" y="790" font-family="system-ui" font-size="20" fill="#ED8936" text-anchor="end">Moderate</text>
    
    <rect x="80" y="840" width="920" height="80" rx="8" fill="#F7FAFC"/>
    <text x="140" y="890" font-family="system-ui" font-size="20" fill="#2D3748">Physical Activity</text>
    <text x="940" y="890" font-family="system-ui" font-size="20" fill="#38A169" text-anchor="end">Good</text>
    
    <!-- Notes -->
    <rect x="40" y="940" width="1000" height="300" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="80" y="1020" font-family="system-ui" font-size="24" font-weight="bold" fill="#2D3748">Notes</text>
    <rect x="80" y="1060" width="920" height="200" rx="8" fill="#F7FAFC" stroke="#E2E8F0"/>
    <text x="100" y="1100" font-family="system-ui" font-size="20" fill="#2D3748">How are you feeling today?</text>
    
    <!-- Submit Button -->
    <rect x="40" y="1260" width="1000" height="80" rx="8" fill="#2B6CB0"/>
    <text x="540" y="1310" font-family="system-ui" font-size="24" fill="#FFFFFF" text-anchor="middle">Save Entry</text>
    
    <!-- Mood History -->
    <rect x="40" y="1360" width="1000" height="400" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="80" y="1440" font-family="system-ui" font-size="24" font-weight="bold" fill="#2D3748">Mood History</text>
    
    <!-- History Items -->
    <rect x="80" y="1480" width="920" height="80" rx="8" fill="#F7FAFC"/>
    <text x="140" y="1530" font-family="system-ui" font-size="20" fill="#2D3748">Today - 9:30 AM</text>
    <text x="940" y="1530" font-family="system-ui" font-size="24" fill="#2B6CB0" text-anchor="end">🙂</text>
    
    <rect x="80" y="1580" width="920" height="80" rx="8" fill="#F7FAFC"/>
    <text x="140" y="1630" font-family="system-ui" font-size="20" fill="#2D3748">Yesterday - 8:45 PM</text>
    <text x="940" y="1630" font-family="system-ui" font-size="24" fill="#ED8936" text-anchor="end">😐</text>
    
    <rect x="80" y="1680" width="920" height="80" rx="8" fill="#F7FAFC"/>
    <text x="140" y="1730" font-family="system-ui" font-size="20" fill="#2D3748">Yesterday - 9:15 AM</text>
    <text x="940" y="1730" font-family="system-ui" font-size="24" fill="#38A169" text-anchor="end">😄</text>
    
    <!-- Bottom Navigation -->
    <rect y="1860" width="1080" height="60" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="216" y="1900" font-family="system-ui" font-size="24" fill="#718096" text-anchor="middle">🏠</text>
    <text x="432" y="1900" font-family="system-ui" font-size="24" fill="#718096" text-anchor="middle">❤️</text>
    <text x="648" y="1900" font-family="system-ui" font-size="24" fill="#718096" text-anchor="middle">💊</text>
    <text x="864" y="1900" font-family="system-ui" font-size="24" fill="#2B6CB0" text-anchor="middle">😊</text>
</svg> 