<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Medication Tracker</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="firebase-init.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      padding: 2em;
    }
    h1 {
      color: #2c7a7b;
    }
    input, select, button {
      display: block;
      margin: 1em 0;
      padding: 0.7em;
      width: 100%;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    button {
      background-color: #2c7a7b;
      color: white;
      border: none;
      cursor: pointer;
    }
    .med-entry {
      background: white;
      padding: 1em;
      border-radius: 10px;
      margin-bottom: 1em;
    }
    .actions {
      display: flex;
      gap: 0.5em;
      margin-top: 0.5em;
    }
    .back-button {
      background: #4a5568;
      margin-top: 2em;
    }
  </style>
</head>
<body>
  <h1>💊 Medication Tracker</h1>

  <input type="text" id="medName" placeholder="Medication Name" />
  <input type="text" id="medDose" placeholder="Dosage (e.g. 10mg)" />
  <input type="time" id="medTime" />
  <select id="medFrequency">
    <option value="">Select Frequency</option>
    <option value="Daily">Daily</option>
    <option value="Weekly">Weekly</option>
    <option value="As Needed">As Needed</option>
  </select>
  <button onclick="addMedication()">Add Medication</button>
  <button onclick="exportToPDF()">📄 Export to PDF</button>
  <button class="back-button" onclick="location.href='index.html'">← Back to Home</button>

  <div id="medicationsList">Loading...</div>

  <script>
    let currentUser;
    firebase.auth().onAuthStateChanged(user => {
      if (!user) {
        window.location.href = "login.html";
      } else {
        currentUser = user;
        loadMedications();
      }
    });

    function addMedication() {
      const name = document.getElementById("medName").value.trim();
      const dose = document.getElementById("medDose").value.trim();
      const time = document.getElementById("medTime").value;
      const frequency = document.getElementById("medFrequency").value;

      if (!name || !dose || !time || !frequency) {
        alert("Please fill in all fields.");
        return;
      }

      firebase.firestore().collection("medications").add({
        uid: currentUser.uid,
        name, dose, time, frequency,
        timestamp: new Date()
      }).then(() => {
        document.getElementById("medName").value = "";
        document.getElementById("medDose").value = "";
        document.getElementById("medTime").value = "";
        document.getElementById("medFrequency").value = "";
      });
    }

    function loadMedications() {
      const db = firebase.firestore();
      db.collection("medications")
        .where("uid", "==", currentUser.uid)
        .orderBy("timestamp", "desc")
        .onSnapshot(snapshot => {
          const list = document.getElementById("medicationsList");
          list.innerHTML = snapshot.empty ? "<p>No medications logged yet.</p>" : "";
          snapshot.forEach(doc => {
            const m = doc.data();
            const div = document.createElement("div");
            div.className = "med-entry";
            div.innerHTML = `
              <strong>${m.name}</strong><br>
              Dosage: ${m.dose}<br>
              Time: ${m.time}<br>
              Frequency: ${m.frequency}
              <div class="actions">
                <button onclick="editMedication('${doc.id}', '${m.name}', '${m.dose}', '${m.time}', '${m.frequency}')">✏️</button>
                <button onclick="deleteMedication('${doc.id}')">❌</button>
              </div>
            `;
            list.appendChild(div);
          });
        });
    }

    function editMedication(id, name, dose, time, frequency) {
      document.getElementById("medName").value = name;
      document.getElementById("medDose").value = dose;
      document.getElementById("medTime").value = time;
      document.getElementById("medFrequency").value = frequency;
      document.querySelector("button[onclick='addMedication()']").textContent = "Update Medication";
      document.querySelector("button[onclick='addMedication()']").onclick = () => updateMedication(id);
    }

    function updateMedication(id) {
      const name = document.getElementById("medName").value.trim();
      const dose = document.getElementById("medDose").value.trim();
      const time = document.getElementById("medTime").value;
      const frequency = document.getElementById("medFrequency").value;

      firebase.firestore().collection("medications").doc(id).update({
        name, dose, time, frequency
      }).then(() => {
        document.getElementById("medName").value = "";
        document.getElementById("medDose").value = "";
        document.getElementById("medTime").value = "";
        document.getElementById("medFrequency").value = "";
        document.querySelector("button[onclick^='updateMedication']").textContent = "Add Medication";
        document.querySelector("button[onclick^='updateMedication']").setAttribute("onclick", "addMedication()")
      });
    }

    function deleteMedication(id) {
      if (confirm("Are you sure you want to delete this medication?")) {
        firebase.firestore().collection("medications").doc(id).delete();
      }
    }

    async function exportToPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const snapshot = await firebase.firestore().collection("medications")
        .where("uid", "==", currentUser.uid)
        .orderBy("timestamp", "desc")
        .get();

      let y = 10;
      doc.setFontSize(14);
      doc.text("Medication Log", 10, y);
      y += 10;
      snapshot.forEach((docItem, i) => {
        const m = docItem.data();
        doc.text(`${i+1}. ${m.name} - ${m.dose} - ${m.time} - ${m.frequency}`, 10, y);
        y += 8;
      });

      doc.save("medications.pdf");
    }
  </script>
</body>
</html>
