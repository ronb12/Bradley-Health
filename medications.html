<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Medication Tracker</title>

  <!-- Firebase & jsPDF -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-messaging-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="firebase-init.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      padding: 2em;
    }
    h1 {
      color: #2c7a7b;
    }
    input, select, button {
      display: block;
      margin: 1em 0;
      padding: 0.7em;
      width: 100%;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }
    button {
      background-color: #2c7a7b;
      color: white;
      border: none;
      cursor: pointer;
    }
    .med-entry {
      background: white;
      padding: 1em;
      border-radius: 10px;
      margin-bottom: 1em;
    }
    .back-button {
      background-color: #4a5568;
      color: white;
      margin-top: 1em;
    }
  </style>
</head>
<body>
  <h1>💊 Medication Tracker</h1>

  <input type="text" id="medName" placeholder="Medication Name" />
  <input type="text" id="medDose" placeholder="Dosage (e.g. 10mg)" />
  <input type="time" id="medTime" />
  <select id="medFrequency">
    <option value="">Select Frequency</option>
    <option value="Daily">Daily</option>
    <option value="Weekly">Weekly</option>
    <option value="As Needed">As Needed</option>
  </select>
  <button onclick="addMedication()">Add Medication</button>
  <button onclick="exportToPDF()">📄 Export to PDF</button>
  <button class="back-button" onclick="window.location.href='index.html'">← Back to Home</button>

  <div id="medicationsList">Loading...</div>

  <script>
    let currentUser;
    const medData = [];

    firebase.auth().onAuthStateChanged(user => {
      if (!user) {
        window.location.href = "login.html";
      } else {
        currentUser = user;
        loadMedications();
        setupPushNotifications();
      }
    });

    const db = firebase.firestore();

    function addMedication() {
      const name = document.getElementById("medName").value.trim();
      const dose = document.getElementById("medDose").value.trim();
      const time = document.getElementById("medTime").value;
      const frequency = document.getElementById("medFrequency").value;

      if (!name || !dose || !time || !frequency) {
        alert("Please fill in all fields.");
        return;
      }

      db.collection("medications").add({
        uid: currentUser.uid,
        name,
        dose,
        time,
        frequency,
        timestamp: new Date()
      }).then(() => {
        document.getElementById("medName").value = "";
        document.getElementById("medDose").value = "";
        document.getElementById("medTime").value = "";
        document.getElementById("medFrequency").value = "";
        loadMedications();
      });
    }

    function loadMedications() {
      db.collection("medications")
        .where("uid", "==", currentUser.uid)
        .orderBy("timestamp", "desc")
        .onSnapshot(snapshot => {
          const list = document.getElementById("medicationsList");
          list.innerHTML = "";
          medData.length = 0;

          if (snapshot.empty) {
            list.innerHTML = "<p>No medications logged yet.</p>";
            return;
          }

          snapshot.forEach(doc => {
            const m = doc.data();
            medData.push(m);
            list.innerHTML += `
              <div class="med-entry">
                <strong>${m.name}</strong><br>
                Dosage: ${m.dose}<br>
                Time: ${m.time}<br>
                Frequency: ${m.frequency}
              </div>
            `;
          });
        });
    }

    async function exportToPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      doc.setFontSize(16);
      doc.text("Medication Log", 15, 20);

      let y = 30;
      medData.forEach((m, i) => {
        doc.setFontSize(12);
        doc.text(`${i + 1}. ${m.name} - ${m.dose} - ${m.time} - ${m.frequency}`, 15, y);
        y += 10;
        if (y > 270) {
          doc.addPage();
          y = 20;
        }
      });

      doc.save("medications-log.pdf");
    }

    function setupPushNotifications() {
      const messaging = firebase.messaging();
      if (Notification.permission !== "granted") {
        messaging.requestPermission?.().then(() => {
          console.log("Push permission granted.");
          return messaging.getToken();
        }).then(token => {
          console.log("Push token:", token);
        }).catch(err => {
          console.warn("Push permission denied or unsupported:", err.message);
        });
      }
    }
  </script>
</body>
</html>
