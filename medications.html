<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>💊 Medication Tracker</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-messaging-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="firebase-init.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      padding: 2em;
    }
    h1 {
      color: #2c7a7b;
    }
    input, select, button {
      display: block;
      margin: 1em 0;
      padding: 0.7em;
      width: 100%;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    button {
      background-color: #2c7a7b;
      color: white;
      border: none;
      cursor: pointer;
    }
    .med-entry {
      background: white;
      padding: 1em;
      border-radius: 10px;
      margin-bottom: 1em;
      display: flex;
      flex-direction: column;
    }
    .med-actions {
      margin-top: 0.5em;
      display: flex;
      gap: 0.5em;
    }
    .back-button {
      background-color: #4a5568;
    }
  </style>
</head>
<body>
  <h1>💊 Medication Tracker</h1>

  <input type="text" id="medName" placeholder="Medication Name" />
  <input type="text" id="medDose" placeholder="Dosage (e.g. 10mg)" />
  <input type="time" id="medTime" />
  <select id="medFrequency">
    <option value="">Select Frequency</option>
    <option value="Daily">Daily</option>
    <option value="Weekly">Weekly</option>
    <option value="As Needed">As Needed</option>
  </select>

  <button onclick="addMedication()">Add Medication</button>
  <button onclick="exportToPDF()">📄 Export to PDF</button>
  <button class="back-button" onclick="location.href='index.html'">← Back to Home</button>

  <div id="medicationsList">Loading...</div>

  <script>
    const db = firebase.firestore();
    const messaging = firebase.messaging();
    let currentUser = null;

    // Firebase auth
    firebase.auth().onAuthStateChanged(user => {
      if (!user) {
        window.location.href = "login.html";
      } else {
        currentUser = user;
        loadMedications();
      }
    });

    // Push Notifications
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/firebase-messaging-sw.js')
        .then(registration => {
          messaging.useServiceWorker(registration);
          return messaging.requestPermission();
        })
        .then(() => messaging.getToken())
        .then(token => {
          console.log("🔔 Push token:", token);
        })
        .catch(err => console.warn("❌ Push error:", err));
    }

    function addMedication() {
      const name = document.getElementById("medName").value.trim();
      const dose = document.getElementById("medDose").value.trim();
      const time = document.getElementById("medTime").value;
      const frequency = document.getElementById("medFrequency").value;

      if (!name || !dose || !time || !frequency) {
        alert("Please fill in all fields.");
        return;
      }

      db.collection("medications").add({
        uid: currentUser.uid,
        name,
        dose,
        time,
        frequency,
        timestamp: new Date()
      }).then(() => {
        clearForm();
        loadMedications();
      });
    }

    function clearForm() {
      document.getElementById("medName").value = "";
      document.getElementById("medDose").value = "";
      document.getElementById("medTime").value = "";
      document.getElementById("medFrequency").value = "";
    }

    function loadMedications() {
      db.collection("medications")
        .where("uid", "==", currentUser.uid)
        .orderBy("timestamp", "desc")
        .onSnapshot(snapshot => {
          const list = document.getElementById("medicationsList");
          list.innerHTML = "";

          if (snapshot.empty) {
            list.innerHTML = "<p>No medications logged yet.</p>";
            return;
          }

          snapshot.forEach(doc => {
            const m = doc.data();
            const div = document.createElement("div");
            div.className = "med-entry";
            div.innerHTML = `
              <strong>${m.name}</strong><br>
              Dosage: ${m.dose}<br>
              Time: ${m.time}<br>
              Frequency: ${m.frequency}
              <div class="med-actions">
                <button onclick="editMedication('${doc.id}', '${m.name}', '${m.dose}', '${m.time}', '${m.frequency}')">✏️ Edit</button>
                <button onclick="deleteMedication('${doc.id}')">🗑️ Delete</button>
              </div>
            `;
            list.appendChild(div);
          });
        });
    }

    function deleteMedication(id) {
      if (confirm("Delete this medication?")) {
        db.collection("medications").doc(id).delete();
      }
    }

    function editMedication(id, name, dose, time, freq) {
      document.getElementById("medName").value = name;
      document.getElementById("medDose").value = dose;
      document.getElementById("medTime").value = time;
      document.getElementById("medFrequency").value = freq;

      document.querySelector("button[onclick='addMedication()']").innerText = "Update Medication";
      document.querySelector("button[onclick='addMedication()']").onclick = function () {
        const updated = {
          name: document.getElementById("medName").value.trim(),
          dose: document.getElementById("medDose").value.trim(),
          time: document.getElementById("medTime").value,
          frequency: document.getElementById("medFrequency").value
        };
        db.collection("medications").doc(id).update(updated).then(() => {
          clearForm();
          this.innerText = "Add Medication";
          this.onclick = addMedication;
        });
      };
    }

    function exportToPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.text("Medication Log", 14, 14);
      let y = 25;
      const meds = document.querySelectorAll(".med-entry");
      meds.forEach(entry => {
        doc.text(entry.innerText, 14, y);
        y += 30;
      });
      doc.save("medications.pdf");
    }
  </script>
</body>
</html>
