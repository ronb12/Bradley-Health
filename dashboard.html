<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Bradley Health Dashboard</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" sizes="192x192" href="assets/icon-192.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="assets/icon-512.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="stylesheet" href="assets/mobile.css" />
  <meta name="theme-color" content="#2B6CB0">

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="firebase-init.js"></script>
  <script src="assets/shared.js"></script>

  <style>
    /* Component-specific styles that extend global styles */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: var(--spacing-md);
      margin-top: var(--spacing-md);
    }

    .action-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: var(--spacing-md);
      margin-top: var(--spacing-md);
    }

    .action-card {
      text-decoration: none;
      color: var(--primary);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-sm);
    }

    .action-card:hover {
      color: var(--primary-dark);
    }

    .action-card .emoji {
      font-size: 2.5em;
    }

    .action-card .label {
      font-weight: 500;
      font-size: 1.1em;
    }

    .header-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: var(--spacing-md);
      margin-top: var(--spacing-sm);
    }

    .settings-btn {
      background: none;
      border: none;
      color: var(--white);
      cursor: pointer;
      font-size: 1.2em;
      padding: var(--spacing-xs);
      transition: transform var(--transition-normal);
    }

    .settings-btn:hover {
      transform: rotate(30deg);
    }
  </style>
</head>
<body>
  <!-- Mobile Header -->
  <header class="mobile-header">
    <div class="mobile-header-content">
      <button class="mobile-menu-button" aria-label="Open menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12h18M3 6h18M3 18h18"></path>
        </svg>
      </button>
      <h1>Dashboard</h1>
      <button class="mobile-menu-button" aria-label="Open notifications">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </svg>
      </button>
    </div>
  </header>

  <!-- Mobile Menu -->
  <nav class="mobile-menu">
    <div class="mobile-menu-header">
      <h2>Menu</h2>
      <button class="mobile-menu-close" aria-label="Close menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"></path>
        </svg>
      </button>
    </div>
    <div class="mobile-menu-items">
      <a href="dashboard.html" class="mobile-menu-item active">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        Dashboard
      </a>
      <a href="blood-pressure.html" class="mobile-menu-item">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
        </svg>
        Blood Pressure
      </a>
      <a href="medications.html" class="mobile-menu-item">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"></path>
        </svg>
        Medications
      </a>
      <a href="mood-tracker.html" class="mobile-menu-item">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z"></path>
          <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
          <line x1="9" y1="9" x2="9.01" y2="9"></line>
          <line x1="15" y1="9" x2="15.01" y2="9"></line>
        </svg>
        Mood Tracker
      </a>
      <a href="profile.html" class="mobile-menu-item">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
        Profile
      </a>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="container">
    <!-- Quick Actions -->
    <section class="mobile-card">
      <div class="mobile-card-header">
        <h2 class="mobile-card-title">Quick Actions</h2>
      </div>
      <div class="quick-actions">
        <button class="mobile-button mobile-button-primary" onclick="location.href='blood-pressure.html'">
          Log Blood Pressure
        </button>
        <button class="mobile-button mobile-button-secondary" onclick="location.href='medications.html'">
          Log Medication
        </button>
        <button class="mobile-button mobile-button-secondary" onclick="location.href='mood-tracker.html'">
          Log Mood
        </button>
      </div>
    </section>

    <!-- Health Summary -->
    <section class="mobile-card">
      <div class="mobile-card-header">
        <h2 class="mobile-card-title">Health Summary</h2>
        <button class="mobile-button mobile-button-secondary" onclick="refreshHealthSummary()">
          Refresh
        </button>
      </div>
      <div id="health-summary" class="health-summary">
        <!-- Health summary content will be loaded here -->
      </div>
    </section>

    <!-- Recent Activity -->
    <section class="mobile-card">
      <div class="mobile-card-header">
        <h2 class="mobile-card-title">Recent Activity</h2>
        <button class="mobile-button mobile-button-secondary" onclick="loadMoreActivity()">
          Load More
        </button>
      </div>
      <div id="recent-activity" class="mobile-list">
        <!-- Recent activity items will be loaded here -->
      </div>
    </section>
  </main>

  <!-- Mobile Navigation -->
  <nav class="mobile-nav">
    <div class="mobile-nav-items">
      <a href="dashboard.html" class="mobile-nav-item active">
        <span class="mobile-nav-icon">🏠</span>
        <span>Home</span>
      </a>
      <a href="blood-pressure.html" class="mobile-nav-item">
        <span class="mobile-nav-icon">❤️</span>
        <span>BP</span>
      </a>
      <a href="medications.html" class="mobile-nav-item">
        <span class="mobile-nav-icon">💊</span>
        <span>Meds</span>
      </a>
      <a href="mood-tracker.html" class="mobile-nav-item">
        <span class="mobile-nav-icon">😊</span>
        <span>Mood</span>
      </a>
      <a href="profile.html" class="mobile-nav-item">
        <span class="mobile-nav-icon">👤</span>
        <span>Profile</span>
      </a>
    </div>
  </nav>

  <!-- Mobile Toast -->
  <div id="mobile-toast" class="mobile-toast"></div>

  <!-- Mobile Loading -->
  <div id="mobile-loading" class="mobile-loading" style="display: none;">
    <div class="mobile-loading-spinner"></div>
  </div>

  <script>
    // Initialize Firebase
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Check authentication state
    auth.onAuthStateChanged(user => {
      if (!user) {
        window.location.href = 'login.html';
      } else {
        // Load user data
        loadUserData(user);
        // Load activity feed
        loadActivityFeed(user);
      }
    });

    // Load user data
    async function loadUserData(user) {
      try {
        const doc = await db.collection('users').doc(user.uid).get();
        if (doc.exists) {
          const data = doc.data();
          document.getElementById('userName').textContent = data.displayName || 'User';
          document.getElementById('displayName').value = data.displayName || '';
          document.getElementById('email').value = user.email;
        }
      } catch (error) {
        console.error('Error loading user data:', error);
      }
    }

    // Load activity feed
    async function loadActivityFeed(user) {
      const activityList = document.getElementById('activityList');
      
      try {
        const snapshot = await db.collection('users').doc(user.uid)
          .collection('activity')
          .orderBy('timestamp', 'desc')
          .limit(5)
          .get();
        
        if (snapshot.empty) {
          activityList.innerHTML = '<p>No recent activity</p>';
          return;
        }
        
        activityList.innerHTML = '';
        snapshot.forEach(doc => {
          const data = doc.data();
          const date = data.timestamp ? data.timestamp.toDate() : new Date();
          
          const activity = document.createElement('div');
          activity.className = 'activity-item';
          activity.innerHTML = `
            <p><strong>${data.type}</strong> - ${date.toLocaleString()}</p>
            <p>${data.description}</p>
          `;
          activityList.appendChild(activity);
        });
      } catch (error) {
        console.error('Error loading activity feed:', error);
        activityList.innerHTML = '<p>Error loading activity feed</p>';
      }
    }

    // Settings modal
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsModal = document.getElementById('settingsModal');
    const settingsForm = document.getElementById('settingsForm');
    const logoutBtn = document.getElementById('logoutBtn');

    settingsBtn.addEventListener('click', () => {
      settingsModal.style.display = 'block';
    });

    window.addEventListener('click', (e) => {
      if (e.target === settingsModal) {
        settingsModal.style.display = 'none';
      }
    });

    settingsForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const user = auth.currentUser;
      const displayName = document.getElementById('displayName').value;
      
      try {
        await db.collection('users').doc(user.uid).update({
          displayName
        });
        
        document.getElementById('userName').textContent = displayName;
        settingsModal.style.display = 'none';
      } catch (error) {
        console.error('Error updating settings:', error);
        alert('Error updating settings');
      }
    });

    logoutBtn.addEventListener('click', async () => {
      try {
        await auth.signOut();
        window.location.href = 'login.html';
      } catch (error) {
        console.error('Error signing out:', error);
      }
    });

    // Dark mode toggle
    const themeToggle = document.getElementById('themeToggle');
    
    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      themeToggle.textContent = isDark ? '☀️' : '🌙';
      document.body.setAttribute('data-theme', isDark ? 'dark' : 'light');
    });

    // Mobile menu functionality
    const menuButton = document.querySelector('.mobile-menu-button');
    const menu = document.querySelector('.mobile-menu');
    const menuClose = document.querySelector('.mobile-menu-close');

    menuButton.addEventListener('click', () => {
      menu.classList.add('active');
    });

    menuClose.addEventListener('click', () => {
      menu.classList.remove('active');
    });

    // Toast functionality
    function showToast(message, duration = 3000) {
      const toast = document.getElementById('mobile-toast');
      toast.textContent = message;
      toast.classList.add('active');
      setTimeout(() => {
        toast.classList.remove('active');
      }, duration);
    }

    // Loading functionality
    function showLoading() {
      document.getElementById('mobile-loading').style.display = 'flex';
    }

    function hideLoading() {
      document.getElementById('mobile-loading').style.display = 'none';
    }

    // Health summary refresh
    async function refreshHealthSummary() {
      showLoading();
      try {
        // Fetch and update health summary
        const summary = await fetchHealthSummary();
        updateHealthSummary(summary);
        showToast('Health summary updated');
      } catch (error) {
        showToast('Failed to update health summary');
        console.error(error);
      } finally {
        hideLoading();
      }
    }

    // Recent activity load more
    async function loadMoreActivity() {
      showLoading();
      try {
        // Fetch and append more activity items
        const activities = await fetchMoreActivity();
        appendActivityItems(activities);
        showToast('More activities loaded');
      } catch (error) {
        showToast('Failed to load more activities');
        console.error(error);
      } finally {
        hideLoading();
      }
    }

    // Initialize dashboard
    document.addEventListener('DOMContentLoaded', () => {
      refreshHealthSummary();
      loadMoreActivity();
    });
  </script>
</body>
</html>
