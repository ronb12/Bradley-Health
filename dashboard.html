<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bradley Health Dashboard</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" sizes="192x192" href="assets/icon-192.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="assets/icon-512.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="stylesheet" href="assets/style.css" />

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="firebase-init.js"></script>
  <script src="assets/shared.js"></script>

  <style>
    /* Component-specific styles that extend global styles */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: var(--spacing-md);
      margin-top: var(--spacing-md);
    }

    .action-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: var(--spacing-md);
      margin-top: var(--spacing-md);
    }

    .action-card {
      text-decoration: none;
      color: var(--primary);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-sm);
    }

    .action-card:hover {
      color: var(--primary-dark);
    }

    .action-card .emoji {
      font-size: 2.5em;
    }

    .action-card .label {
      font-weight: 500;
      font-size: 1.1em;
    }

    .header-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: var(--spacing-md);
      margin-top: var(--spacing-sm);
    }

    .settings-btn {
      background: none;
      border: none;
      color: var(--white);
      cursor: pointer;
      font-size: 1.2em;
      padding: var(--spacing-xs);
      transition: transform var(--transition-normal);
    }

    .settings-btn:hover {
      transform: rotate(30deg);
    }
  </style>
</head>
<body>
  <header>
    <h1>Bradley Health Dashboard</h1>
    <p>Welcome back, <span id="userName">User</span>!</p>
    <div class="header-controls">
      <button class="settings-btn" id="settingsBtn" title="Settings">⚙️</button>
      <button class="settings-btn" id="themeToggle" title="Toggle Dark Mode">🌙</button>
    </div>
  </header>

  <main>
    <section class="quick-stats">
      <h2>Quick Stats</h2>
      <div class="stats-grid">
        <div class="stat-card">
          <h3>Today's Steps</h3>
          <p id="todaySteps">0</p>
        </div>
        <div class="stat-card">
          <h3>Blood Pressure</h3>
          <p id="latestBP">--/--</p>
        </div>
        <div class="stat-card">
          <h3>Mood</h3>
          <p id="latestMood">--</p>
        </div>
        <div class="stat-card">
          <h3>Rolls</h3>
          <p id="todayRolls">0</p>
        </div>
      </div>
    </section>

    <section class="quick-actions">
      <h2>Quick Actions</h2>
      <div class="action-grid">
        <a href="blood-pressure.html" class="action-card">
          <span class="emoji">❤️</span>
          <span class="label">Blood Pressure</span>
        </a>
        <a href="mood-tracker.html" class="action-card">
          <span class="emoji">😊</span>
          <span class="label">Mood Tracker</span>
        </a>
        <a href="roll-tracker.html" class="action-card">
          <span class="emoji">🔄</span>
          <span class="label">Roll Tracker</span>
        </a>
        <a href="medications.html" class="action-card">
          <span class="emoji">💊</span>
          <span class="label">Medications</span>
        </a>
      </div>
    </section>

    <section class="recent-activity">
      <h2>Recent Activity</h2>
      <div class="activity-feed">
        <div id="activityList">Loading...</div>
      </div>
    </section>
  </main>

  <!-- Settings Modal -->
  <div id="settingsModal" class="modal">
    <div class="modal-content">
      <h2>Settings</h2>
      <form id="settingsForm">
        <div class="form-group">
          <label for="displayName">Display Name</label>
          <input type="text" id="displayName" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required>
        </div>
        <button type="submit">Save Changes</button>
      </form>
      <button id="logoutBtn" class="mt-2">Logout</button>
    </div>
  </div>

  <script>
    // Initialize Firebase
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Check authentication state
    auth.onAuthStateChanged(user => {
      if (!user) {
        window.location.href = 'login.html';
      } else {
        // Load user data
        loadUserData(user);
        // Load activity feed
        loadActivityFeed(user);
      }
    });

    // Load user data
    async function loadUserData(user) {
      try {
        const doc = await db.collection('users').doc(user.uid).get();
        if (doc.exists) {
          const data = doc.data();
          document.getElementById('userName').textContent = data.displayName || 'User';
          document.getElementById('displayName').value = data.displayName || '';
          document.getElementById('email').value = user.email;
        }
      } catch (error) {
        console.error('Error loading user data:', error);
      }
    }

    // Load activity feed
    async function loadActivityFeed(user) {
      const activityList = document.getElementById('activityList');
      
      try {
        const snapshot = await db.collection('users').doc(user.uid)
          .collection('activity')
          .orderBy('timestamp', 'desc')
          .limit(5)
          .get();
        
        if (snapshot.empty) {
          activityList.innerHTML = '<p>No recent activity</p>';
          return;
        }
        
        activityList.innerHTML = '';
        snapshot.forEach(doc => {
          const data = doc.data();
          const date = data.timestamp ? data.timestamp.toDate() : new Date();
          
          const activity = document.createElement('div');
          activity.className = 'activity-item';
          activity.innerHTML = `
            <p><strong>${data.type}</strong> - ${date.toLocaleString()}</p>
            <p>${data.description}</p>
          `;
          activityList.appendChild(activity);
        });
      } catch (error) {
        console.error('Error loading activity feed:', error);
        activityList.innerHTML = '<p>Error loading activity feed</p>';
      }
    }

    // Settings modal
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsModal = document.getElementById('settingsModal');
    const settingsForm = document.getElementById('settingsForm');
    const logoutBtn = document.getElementById('logoutBtn');

    settingsBtn.addEventListener('click', () => {
      settingsModal.style.display = 'block';
    });

    window.addEventListener('click', (e) => {
      if (e.target === settingsModal) {
        settingsModal.style.display = 'none';
      }
    });

    settingsForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const user = auth.currentUser;
      const displayName = document.getElementById('displayName').value;
      
      try {
        await db.collection('users').doc(user.uid).update({
          displayName
        });
        
        document.getElementById('userName').textContent = displayName;
        settingsModal.style.display = 'none';
      } catch (error) {
        console.error('Error updating settings:', error);
        alert('Error updating settings');
      }
    });

    logoutBtn.addEventListener('click', async () => {
      try {
        await auth.signOut();
        window.location.href = 'login.html';
      } catch (error) {
        console.error('Error signing out:', error);
      }
    });

    // Dark mode toggle
    const themeToggle = document.getElementById('themeToggle');
    
    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      themeToggle.textContent = isDark ? '☀️' : '🌙';
      document.body.setAttribute('data-theme', isDark ? 'dark' : 'light');
    });
  </script>
</body>
</html>
